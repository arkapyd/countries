<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2420; --ink-soft:#4B5450;
    --paper:#E9EDE7; --paper-raised:#F5F7F2;
    --line:#C9D0C4; --line-strong:#A8B29F;
    --brick:#A8502D; --brick-dark:#7A3A20;
    --steel:#30546A; --gold:#A8823E;
    --font-display:"Source Serif 4",Georgia,serif;
    --font-body:"Inter",-apple-system,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;
    --radius:3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);}

  .frame{display:grid;grid-template-columns:272px 1fr;min-height:100vh;}

  /* sidebar */
  .sidebar{background:var(--paper-raised);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:28px 20px;}
  .brand{margin-bottom:26px;}
  .brand-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 6px;}
  .brand-title{font-family:var(--font-display);font-size:22px;font-weight:600;margin:0;line-height:1.25;}
  .index-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 10px;}
  .country-index{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;}
  .country-row{display:flex;align-items:center;gap:11px;padding:9px 8px;border:1px solid transparent;border-radius:var(--radius);background:none;cursor:pointer;text-align:left;font-family:var(--font-body);color:var(--ink);width:100%;}
  .country-row:hover{border-color:var(--line-strong);}
  .country-row.active{background:var(--paper);border-color:var(--ink);}
  .stamp{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.04em;border:1.5px solid var(--brick);color:var(--brick-dark);padding:3px 6px;border-radius:2px;transform:rotate(-2deg);flex-shrink:0;}
  .country-row-name{font-size:14px;line-height:1.3;}
  .country-row-region{display:block;font-size:11px;color:var(--ink-soft);}
  .sidebar-foot{border-top:1px solid var(--line);margin-top:16px;padding-top:12px;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);}
  .sidebar-foot p{margin:0 0 3px;}

  /* main */
  .main{padding:32px 40px 56px;max-width:1000px;}
  .topbar{border-bottom:2px solid var(--ink);padding-bottom:16px;margin-bottom:22px;}
  .topbar-eyebrow{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--steel);margin:0 0 4px;}
  .topbar-title{font-family:var(--font-display);font-size:32px;font-weight:600;margin:0 0 2px;}
  .topbar-sub{font-size:13.5px;color:var(--ink-soft);margin:0;}
  .thesis{font-family:var(--font-display);font-size:17px;font-weight:400;line-height:1.55;color:var(--ink);margin:0 0 30px;max-width:78ch;border-left:3px solid var(--steel);padding-left:16px;}

  /* kpis */
  .kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:34px;}
  .kpi-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .kpi-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 8px;line-height:1.3;}
  .kpi-value{font-family:var(--font-display);font-size:25px;font-weight:600;margin:0 0 5px;line-height:1.05;}
  .kpi-note{font-size:11.5px;color:var(--ink-soft);margin:0;line-height:1.3;}

  /* panels */
  .panel{margin-bottom:34px;}
  .panel-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:8px;}
  .panel-head h3{font-family:var(--font-display);font-size:19px;font-weight:600;margin:0;}
  .panel-sub{font-size:12.5px;color:var(--ink-soft);margin:0;}

  .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
  .chart-slot{background:var(--paper-raised);border:1px dashed var(--line-strong);border-radius:var(--radius);min-height:230px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;}
  .chart-slot-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--brick-dark);margin:0 0 auto;}
  .chart-slot-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin:0 0 5px;}
  .chart-slot-hint{font-size:12px;color:var(--ink-soft);margin:0;line-height:1.4;}

  .insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;}
  .insight-card{background:var(--paper-raised);border-left:3px solid var(--gold);padding:14px 18px;}
  .insight-card h4{font-family:var(--font-display);font-size:15.5px;font-weight:600;margin:0 0 6px;line-height:1.3;}
  .insight-card p{font-size:13.5px;line-height:1.55;margin:0;color:var(--ink);}

  /* responsive */
  @media (max-width:820px){
    .frame{grid-template-columns:1fr;}
    .sidebar{border-right:none;border-bottom:1px solid var(--line);}
    .country-index{flex-direction:row;flex-wrap:wrap;overflow-y:visible;}
    .country-row{width:auto;}
    .main{padding:24px 20px 40px;}
    .topbar-title{font-size:26px;}
  }
</style>
</head>
<body>

<div class="frame">

  <aside class="sidebar">
    <div class="brand">
      <p class="brand-eyebrow" id="fileLabel">Research file</p>
      <h1 class="brand-title" id="dashTitle">Country dashboard</h1>
    </div>

    <p class="index-label">Countries</p>
    <nav class="country-index" id="countryIndex" aria-label="Countries covered"></nav>

    <div class="sidebar-foot">
      <p id="baselineNote"></p>
      <p id="lastUpdated"></p>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <p class="topbar-eyebrow" id="activeRegion"></p>
      <h2 class="topbar-title" id="activeName"></h2>
      <p class="topbar-sub" id="activeSub"></p>
    </header>

    <p class="thesis" id="thesis"></p>

    <section class="kpi-strip" id="kpiStrip" aria-label="Summary indicators"></section>

    <section class="panel">
      <div class="panel-head">
        <h3>Charts</h3>
        <p class="panel-sub">Reserved slots — we'll wire these up once the visualisation approach is settled</p>
      </div>
      <div class="chart-grid" id="chartGrid"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h3>Key insights</h3>
        <p class="panel-sub">The core argument, drawn from the research</p>
      </div>
      <div class="insight-grid" id="insightGrid"></div>
    </section>
  </main>

</div>

<script src="data.js"></script>
<script>
(function () {
  var D = window.DASHBOARD_DATA;
  if (!D || !D.countries || !D.countries.length) {
    document.getElementById("thesis").textContent =
      "No data found. Check that data.js is present and defines window.DASHBOARD_DATA.";
    return;
  }

  var meta = D.meta || {};
  var countries = D.countries;
  var activeCode = countries[0].code;

  var $ = function (id) { return document.getElementById(id); };
  var el = function (tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };
  var esc = function (s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  };

  // static chrome
  if (meta.fileLabel) $("fileLabel").textContent = meta.fileLabel;
  if (meta.title) { $("dashTitle").textContent = meta.title; document.title = meta.title; }
  $("baselineNote").textContent = meta.baselineNote || "";
  $("lastUpdated").textContent = meta.lastUpdated ? "Updated " + meta.lastUpdated : "";

  function renderSidebar() {
    var nav = $("countryIndex");
    nav.innerHTML = "";
    countries.forEach(function (c) {
      var btn = el("button", "country-row" + (c.code === activeCode ? " active" : ""));
      btn.setAttribute("data-code", c.code);
      btn.innerHTML =
        '<span class="stamp">' + esc(c.code) + '</span>' +
        '<span><span class="country-row-name">' + esc(c.name) + '</span>' +
        '<span class="country-row-region">' + esc(c.region) + '</span></span>';
      btn.addEventListener("click", function () { setActive(c.code); });
      nav.appendChild(btn);
    });
  }

  function renderKpis(c) {
    var strip = $("kpiStrip");
    strip.innerHTML = "";
    (c.kpis || []).forEach(function (k) {
      var card = el("div", "kpi-card");
      card.innerHTML =
        '<p class="kpi-label">' + esc(k.label) + '</p>' +
        '<p class="kpi-value">' + esc(k.value) + '</p>' +
        (k.note ? '<p class="kpi-note">' + esc(k.note) + '</p>' : '');
      strip.appendChild(card);
    });
  }

  function renderChartSlots(c) {
    var grid = $("chartGrid");
    grid.innerHTML = "";
    var slots = (c.chartSlots && c.chartSlots.length)
      ? c.chartSlots
      : [{ title: "Chart — to be defined", hint: "" }];
    slots.forEach(function (s) {
      var slot = el("div", "chart-slot");
      slot.innerHTML =
        '<p class="chart-slot-tag">Chart slot</p>' +
        '<p class="chart-slot-title">' + esc(s.title) + '</p>' +
        (s.hint ? '<p class="chart-slot-hint">' + esc(s.hint) + '</p>' : '');
      grid.appendChild(slot);
    });
  }

  function renderInsights(c) {
    var grid = $("insightGrid");
    grid.innerHTML = "";
    (c.insights || []).forEach(function (ins) {
      var card = el("div", "insight-card");
      card.innerHTML =
        '<h4>' + esc(ins.title) + '</h4>' +
        '<p>' + esc(ins.text) + '</p>';
      grid.appendChild(card);
    });
  }

  function setActive(code) {
    var c = countries.filter(function (x) { return x.code === code; })[0];
    if (!c) return;
    activeCode = code;
    $("activeRegion").textContent = c.region || "";
    $("activeName").textContent = c.name || "";
    $("activeSub").textContent = c.subtitle || "";
    $("thesis").textContent = c.thesis || "";
    renderSidebar();
    renderKpis(c);
    renderChartSlots(c);
    renderInsights(c);
  }

  setActive(activeCode);
})();
</script>
</body>
</html>
