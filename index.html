<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141210;
    --ink-soft:#5C5548;
    --cream-orange:#F7A64B;
    --cream-orange-hot:#F08A1D;
    --burnt:#8A4A0F;
    --eggshell:#F7F3E6;
    --eggshell-raised:#FCFAF2;
    --line:#E2D9C2;
    --line-strong:#C9BC9B;
    --font-display:"Source Serif 4",Georgia,serif;
    --font-body:"Inter",-apple-system,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;
    --radius:4px;
    --pop:transform .16s cubic-bezier(.34,1.4,.64,1), background .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--eggshell);color:var(--ink);font-family:var(--font-body);}

  .frame{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}

  /* sidebar */
  .sidebar{background:var(--eggshell-raised);border-right:2px solid var(--ink);display:flex;flex-direction:column;padding:26px 18px;}
  .brand{margin-bottom:24px;}
  .brand-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--burnt);margin:0 0 6px;}
  .brand-title{font-family:var(--font-display);font-size:23px;font-weight:700;margin:0;line-height:1.2;}
  .index-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 10px;}
  .country-index{display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1;}
  .country-row{display:flex;align-items:center;gap:11px;padding:10px 9px;border:1.5px solid var(--line-strong);border-radius:var(--radius);background:var(--eggshell-raised);cursor:pointer;text-align:left;font-family:var(--font-body);color:var(--ink);width:100%;transition:var(--pop);}
  .country-row:hover{background:var(--cream-orange);border-color:var(--ink);transform:scale(1.04);}
  .country-row:hover .country-row-name,.country-row:hover .country-row-region{color:#000;font-weight:700;}
  .country-row.active{background:var(--cream-orange);border-color:var(--ink);box-shadow:3px 3px 0 var(--ink);}
  .country-row.active .country-row-name{font-weight:700;}
  .stamp{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;border:2px solid var(--cream-orange-hot);color:var(--burnt);background:var(--eggshell-raised);padding:3px 6px;border-radius:2px;transform:rotate(-2deg);flex-shrink:0;}
  .country-row:hover .stamp,.country-row.active .stamp{border-color:var(--ink);color:#000;}
  .country-row-name{font-size:14px;line-height:1.3;transition:color .16s,font-weight .16s;}
  .country-row-region{display:block;font-size:11px;color:var(--ink-soft);transition:color .16s;}
  .sidebar-foot{border-top:2px solid var(--ink);margin-top:16px;padding-top:12px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);line-height:1.5;}
  .sidebar-foot p{margin:0 0 4px;}
  .sound-toggle{margin-top:8px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.05em;border:1.5px solid var(--line-strong);background:var(--eggshell-raised);color:var(--ink-soft);border-radius:var(--radius);padding:5px 9px;cursor:pointer;transition:var(--pop);}
  .sound-toggle:hover{background:var(--cream-orange);color:#000;font-weight:700;border-color:var(--ink);transform:scale(1.04);}

  /* main */
  .main{padding:30px 34px 48px;}
  .topbar{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:22px;display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;}
  .topbar-eyebrow{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--burnt);margin:0 0 4px;}
  .topbar-title{font-family:var(--font-display);font-size:34px;font-weight:700;margin:0 0 2px;}
  .topbar-sub{font-size:13.5px;color:var(--ink-soft);margin:0;}
  .conversion-chip{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.03em;color:var(--burnt);border:1.5px solid var(--cream-orange-hot);background:var(--eggshell-raised);border-radius:999px;padding:5px 12px;white-space:nowrap;}

  .body-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:28px;align-items:start;}

  .thesis{font-family:var(--font-display);font-size:16.5px;font-weight:400;line-height:1.55;color:var(--ink);margin:0 0 26px;border-left:4px solid var(--cream-orange-hot);padding-left:16px;}

  .kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:30px;}
  .kpi-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-radius:var(--radius);padding:13px 15px;transition:var(--pop);cursor:default;}
  .kpi-card:hover{background:var(--cream-orange);border-color:var(--ink);transform:scale(1.05);box-shadow:4px 4px 0 var(--ink);z-index:2;position:relative;}
  .kpi-card:hover .kpi-label,.kpi-card:hover .kpi-value,.kpi-card:hover .kpi-note{color:#000;}
  .kpi-card:hover .kpi-label,.kpi-card:hover .kpi-note{font-weight:700;}
  .kpi-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--burnt);margin:0 0 8px;line-height:1.35;transition:color .16s,font-weight .16s;}
  .kpi-value{font-family:var(--font-display);font-size:24px;font-weight:700;margin:0 0 5px;line-height:1.05;transition:color .16s;}
  .kpi-note{font-size:11px;color:var(--ink-soft);margin:0;line-height:1.35;transition:color .16s,font-weight .16s;}

  .panel{margin-bottom:30px;}
  .panel.window + .panel.window{margin-top:8px;}
  .window-sub{margin:0 0 14px;}
  .panel-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap;border-bottom:2px solid var(--ink);padding-bottom:7px;}
  .panel-head h3{font-family:var(--font-display);font-size:19px;font-weight:700;margin:0;}
  .panel-sub{font-size:12.5px;color:var(--ink-soft);margin:0;}

  /* window switcher — chunkier segmented control, distinct from tabs */
  .window-switch{display:flex;gap:0;margin-bottom:18px;border:2px solid var(--ink);border-radius:6px;overflow:hidden;width:fit-content;max-width:100%;box-shadow:3px 3px 0 var(--ink);flex-wrap:wrap;}
  .window-btn{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.01em;padding:11px 22px;background:var(--eggshell-raised);color:var(--ink-soft);border:none;border-right:2px solid var(--ink);cursor:pointer;transition:background .16s ease,color .16s ease;display:flex;align-items:center;gap:9px;}
  .window-switch .window-btn:last-child{border-right:none;}
  .window-btn .win-num{font-family:var(--font-mono);font-size:11px;font-weight:600;border:1.5px solid currentColor;border-radius:3px;padding:1px 5px;opacity:.75;}
  .window-btn:hover{background:var(--cream-orange);color:#000;}
  .window-btn.active{background:var(--ink);color:var(--eggshell-raised);}
  .window-btn.active .win-num{opacity:1;}
  @media (max-width:520px){ .window-btn{flex:1;justify-content:center;padding:11px 12px;font-size:13.5px;} }

  /* tabs */
  .tab-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .tab-btn{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:9px 18px;border:1.5px solid var(--line-strong);background:var(--eggshell-raised);color:var(--ink-soft);border-radius:var(--radius);cursor:pointer;transition:var(--pop);}
  .tab-btn:hover{background:var(--cream-orange);color:#000;font-weight:700;border-color:var(--ink);transform:scale(1.06);}
  .tab-btn.active{background:var(--cream-orange);color:#000;font-weight:700;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);}
  .tab-note{font-size:12.5px;line-height:1.5;color:var(--ink-soft);border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:var(--eggshell-raised);padding:10px 14px;margin:0 0 16px;}

  .chart-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-radius:var(--radius);padding:16px 18px 12px;margin-bottom:16px;transition:border-color .16s ease, box-shadow .16s ease;}
  .chart-card:hover{border-color:var(--ink);box-shadow:4px 4px 0 var(--ink);}
  .chart-title{font-family:var(--font-display);font-size:16px;font-weight:700;margin:0 0 2px;}
  .chart-unit{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--burnt);margin:0 0 12px;}
  .chart-foot{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin:10px 0 2px;border-top:1px solid var(--line);padding-top:8px;}
  .chart-src{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);line-height:1.6;margin:6px 0 2px;}
  .chart-src a{color:var(--burnt);text-decoration:underline;text-decoration-color:var(--cream-orange-hot);text-underline-offset:2px;transition:color .16s,font-weight .16s;}
  .chart-src a:hover{color:#000;font-weight:700;}

  /* HTML bar rows */
  .bars{display:flex;flex-direction:column;gap:3px;}
  .crop-row{border-radius:var(--radius);}
  .crop-bar-line{display:grid;grid-template-columns:150px 1fr auto;align-items:center;gap:12px;padding:6px 6px;border-radius:var(--radius);text-decoration:none;color:inherit;}
  a.crop-bar-line{cursor:pointer;}
  a.crop-bar-line:hover{background:var(--cream-orange);}
  .crop-bar-label{font-family:var(--font-mono);font-size:12px;text-align:right;color:var(--ink);line-height:1.25;transition:color .16s,font-weight .16s;}
  a.crop-bar-line:hover .crop-bar-label{color:#000;font-weight:700;}
  .crop-bar-track{height:22px;background:#EFE9D8;border:1.5px solid var(--ink);border-radius:3px;overflow:hidden;}
  .crop-bar-fill{display:block;height:100%;width:0;background:var(--cream-orange);transition:width .6s cubic-bezier(.25,1,.4,1),background .16s ease;}
  a.crop-bar-line:hover .crop-bar-fill{background:var(--cream-orange-hot);}
  .crop-bar-val{font-family:var(--font-mono);font-size:12.5px;font-weight:600;color:var(--burnt);transition:color .16s,font-weight .16s;}
  a.crop-bar-line:hover .crop-bar-val{color:#000;font-weight:700;}

  .crop-states{max-height:0;overflow:hidden;opacity:0;padding:0 6px 0 162px;
    transition:max-height .3s ease,opacity .3s ease,padding .3s ease;
    font-size:12px;line-height:1.5;color:var(--ink-soft);}
  .crop-row.has-states:hover .crop-states,.crop-row.has-states:focus-within .crop-states{max-height:160px;opacity:1;padding-top:5px;padding-bottom:9px;}
  .crop-states b{color:var(--burnt);font-weight:600;}
  .crop-states a{display:inline-block;margin-top:3px;font-family:var(--font-mono);font-size:10.5px;color:var(--burnt);text-decoration:underline;text-decoration-color:var(--cream-orange-hot);text-underline-offset:2px;transition:color .16s,font-weight .16s;}
  .crop-states a:hover{color:#000;font-weight:700;}

  .badge-title{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:4px 0 10px;}
  .badge-wrap{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:8px;}
  .rank-badge{display:inline-block;font-family:var(--font-mono);font-size:11px;border:2px solid var(--cream-orange-hot);background:var(--eggshell-raised);color:var(--ink);text-decoration:none;border-radius:2px;padding:5px 9px;transform:rotate(-1.2deg);transition:var(--pop);}
  a.rank-badge{cursor:pointer;}
  .rank-badge:nth-child(even){transform:rotate(1.2deg);}
  .rank-badge b{color:var(--burnt);font-weight:600;}
  .rank-badge:hover{background:var(--cream-orange);border-color:var(--ink);color:#000;font-weight:700;transform:scale(1.08) rotate(0deg);box-shadow:3px 3px 0 var(--ink);}
  .rank-badge:hover b{color:#000;font-weight:700;}

  .trade-card{display:block;background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-left:4px solid var(--cream-orange-hot);border-radius:var(--radius);padding:14px 17px;margin-bottom:16px;transition:var(--pop);text-decoration:none;color:inherit;}
  a.trade-card{cursor:pointer;}
  .trade-card:hover{background:var(--cream-orange);border-color:var(--ink);border-left-color:var(--ink);transform:scale(1.02);box-shadow:4px 4px 0 var(--ink);}
  .trade-card:hover h4,.trade-card:hover .trade-text{color:#000;}
  .trade-card:hover .trade-text{font-weight:700;}
  .trade-card h4{font-family:var(--font-display);font-size:15.5px;font-weight:700;margin:0 0 6px;transition:color .16s;}
  .trade-card .trade-text{font-size:13px;line-height:1.55;margin:0;color:var(--ink);transition:color .16s,font-weight .16s;}
  .trade-src{font-family:var(--font-mono);font-size:10.5px;color:var(--burnt);line-height:1.45;margin:9px 0 0;border-top:1px solid var(--line);padding-top:7px;transition:color .16s,font-weight .16s;}
  .trade-card:hover .trade-src{color:#000;font-weight:700;border-top-color:var(--ink);}

  /* insights rail */
  .rail-head{border-bottom:2px solid var(--ink);padding-bottom:7px;margin-bottom:14px;}
  .rail-head h3{font-family:var(--font-display);font-size:19px;font-weight:700;margin:0 0 2px;}
  .rail-head p{font-size:12px;color:var(--ink-soft);margin:0;}
  .insight-rail{display:flex;flex-direction:column;gap:12px;}
  .insight-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-left:4px solid var(--cream-orange-hot);border-radius:var(--radius);padding:13px 16px;transition:var(--pop);}
  .insight-card:hover{background:var(--cream-orange);border-color:var(--ink);border-left-color:var(--ink);transform:scale(1.03);box-shadow:4px 4px 0 var(--ink);}
  .insight-card:hover h4,.insight-card:hover p{color:#000;}
  .insight-card:hover p{font-weight:700;}
  .insight-card h4{font-family:var(--font-display);font-size:15px;font-weight:700;margin:0 0 6px;line-height:1.3;transition:color .16s;}
  .insight-card p{font-size:12.5px;line-height:1.5;margin:0;color:var(--ink);transition:color .16s,font-weight .16s;}

  @media (max-width:1080px){
    .body-grid{grid-template-columns:1fr;}
    .insight-rail{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
  }
  @media (max-width:820px){
    .frame{grid-template-columns:1fr;}
    .sidebar{border-right:none;border-bottom:2px solid var(--ink);}
    .country-index{flex-direction:row;flex-wrap:wrap;overflow-y:visible;}
    .country-row{width:auto;}
    .main{padding:22px 18px 40px;}
    .topbar-title{font-size:27px;}
    .crop-bar-line{grid-template-columns:110px 1fr auto;}
    .crop-states{padding-left:122px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }

  /* themed scrollbars */
  html{scrollbar-color:var(--cream-orange-hot) var(--eggshell);scrollbar-width:thin;}
  *{scrollbar-color:var(--cream-orange-hot) var(--eggshell-raised);scrollbar-width:thin;}
  ::-webkit-scrollbar{width:12px;height:12px;}
  ::-webkit-scrollbar-track{background:var(--eggshell);border-left:1.5px solid var(--line);}
  ::-webkit-scrollbar-thumb{background:var(--cream-orange);border:2px solid var(--eggshell);border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--cream-orange-hot);}
  ::-webkit-scrollbar-corner{background:var(--eggshell);}
  .country-index::-webkit-scrollbar{width:9px;}
  .country-index::-webkit-scrollbar-track{background:var(--eggshell-raised);border:none;}

  /* glossary */
  .glossary-btn{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--burnt);border:1.5px solid var(--cream-orange-hot);background:var(--eggshell-raised);border-radius:999px;padding:5px 14px;cursor:pointer;transition:var(--pop);}
  .glossary-btn:hover{background:var(--cream-orange);color:#000;font-weight:700;border-color:var(--ink);transform:scale(1.05);}
  .glossary-btn.active{background:var(--cream-orange);color:#000;font-weight:700;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);}
  .glossary-panel{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease,opacity .35s ease,margin .35s ease;margin:0;}
  .glossary-panel.open{max-height:2600px;opacity:1;margin:0 0 26px;}
  .glossary-inner{border:2px solid var(--ink);border-radius:var(--radius);background:var(--eggshell-raised);padding:16px 18px;box-shadow:4px 4px 0 var(--ink);}
  .glossary-inner h3{font-family:var(--font-display);font-size:17px;font-weight:700;margin:0 0 3px;}
  .glossary-inner .gloss-sub{font-size:12px;color:var(--ink-soft);margin:0 0 14px;}
  .glossary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
  .gloss-item{border-left:3px solid var(--cream-orange-hot);background:var(--eggshell);border-radius:0 var(--radius) var(--radius) 0;padding:9px 12px;transition:background .16s ease,transform .16s ease;}
  .gloss-item:hover{background:var(--cream-orange);transform:translateX(2px);}
  .gloss-item:hover .gloss-full,.gloss-item:hover .gloss-note{color:#000;}
  .gloss-term{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--ink);}
  .gloss-full{font-family:var(--font-display);font-size:13.5px;font-weight:600;color:var(--ink);margin-left:6px;}
  .gloss-note{font-size:12px;line-height:1.45;color:var(--ink-soft);margin:4px 0 0;}
</style>
</head>
<body>

<div class="frame">

  <aside class="sidebar">
    <div class="brand">
      <p class="brand-eyebrow" id="fileLabel">Research file</p>
      <h1 class="brand-title" id="dashTitle">Country dashboard</h1>
    </div>
    <p class="index-label">Countries</p>
    <nav class="country-index" id="countryIndex" aria-label="Countries covered"></nav>
    <div class="sidebar-foot">
      <p id="baselineNote"></p>
      <p id="lastUpdated"></p>
      <button class="sound-toggle" id="soundToggle" type="button">Sound: on</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p class="topbar-eyebrow" id="activeRegion"></p>
        <h2 class="topbar-title" id="activeName"></h2>
        <p class="topbar-sub" id="activeSub"></p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <button class="glossary-btn" id="glossaryBtn" type="button" aria-expanded="false">Glossary</button>
        <span class="conversion-chip" id="conversionChip"></span>
      </div>
    </header>

    <div class="glossary-panel" id="glossaryPanel">
      <div class="glossary-inner">
        <h3 id="glossaryTitle">Glossary</h3>
        <p class="gloss-sub" id="glossarySub"></p>
        <div class="glossary-grid" id="glossaryGrid"></div>
      </div>
    </div>

    <div class="body-grid">
      <div class="body-left">
        <p class="thesis" id="thesis"></p>
        <section class="kpi-strip" id="kpiStrip" aria-label="Summary indicators"></section>
        <div class="window-switch" id="windowSwitch" role="tablist" aria-label="Windows"></div>
        <div id="windowsHost"></div>
      </div>

      <aside class="body-right">
        <div class="rail-head">
          <h3>Key insights</h3>
          <p>The core argument, drawn from the research</p>
        </div>
        <div class="insight-rail" id="insightRail"></div>
      </aside>
    </div>
  </main>

</div>

<script src="data.js"></script>
<script>
(function () {
  var D = window.DASHBOARD_DATA;
  if (!D || !D.countries || !D.countries.length) {
    document.getElementById("thesis").textContent =
      "No data found. Check that data.js is present and defines window.DASHBOARD_DATA.";
    return;
  }

  var meta = D.meta || {};
  var countries = D.countries;
  var activeCode = countries[0].code;

  var $ = function (id) { return document.getElementById(id); };
  var el = function (tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };
  var esc = function (s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  };
  var linkAttrs = 'target="_blank" rel="noopener noreferrer"';

  /* gentle click sound */
  var soundOn = true, audioCtx = null;
  function tick() {
    if (!soundOn) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      var t = audioCtx.currentTime;
      var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(660, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.07);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.05, t + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.1);
    } catch (e) {}
  }
  document.addEventListener("click", function (e) {
    if (e.target.closest(".country-row, .kpi-card, .insight-card, .trade-card, .chart-card, .tab-btn, .window-btn, .rank-badge, .crop-bar-line, .crop-states a, .chart-src a, .sound-toggle, .glossary-btn, .gloss-item")) tick();
  });
  $("soundToggle").addEventListener("click", function () {
    soundOn = !soundOn;
    this.textContent = "Sound: " + (soundOn ? "on" : "off");
    if (soundOn) tick();
  });

  /* static chrome */
  if (meta.fileLabel) $("fileLabel").textContent = meta.fileLabel;
  if (meta.title) { $("dashTitle").textContent = meta.title; document.title = meta.title; }
  $("baselineNote").textContent = meta.baselineNote || "";
  $("lastUpdated").textContent = meta.lastUpdated ? "Updated " + meta.lastUpdated : "";
  $("conversionChip").textContent = meta.conversionNote || "";
  if (!meta.conversionNote) $("conversionChip").style.display = "none";

  function sourcesLine(sources) {
    if (!sources || !sources.length) return "";
    var links = sources.map(function (s) {
      return '<a href="' + esc(s.url) + '" ' + linkAttrs + '>' + esc(s.label) + ' ↗</a>';
    }).join(' · ');
    return '<p class="chart-src">' + (sources.length > 1 ? 'Sources: ' : 'Source: ') + links + '</p>';
  }

  /* HTML bar chart (rows expand on hover to show producer states) */
  function buildChartCard(chart) {
    var bars = chart.bars || [];
    var max = chart.max || Math.max.apply(null, bars.map(function (b) { return b.value; })) || 1;
    var rows = bars.map(function (b) {
      var pct = Math.max(2, (b.value / max) * 100);
      var lineInner =
        '<span class="crop-bar-label">' + esc(b.label) + '</span>' +
        '<span class="crop-bar-track"><span class="crop-bar-fill" data-w="' + pct.toFixed(2) + '"></span></span>' +
        '<span class="crop-bar-val">' + esc(b.display != null ? b.display : b.value) + '</span>';
      var line = b.sourceUrl
        ? '<a class="crop-bar-line" href="' + esc(b.sourceUrl) + '" ' + linkAttrs + ' title="Open figure source">' + lineInner + '</a>'
        : '<div class="crop-bar-line">' + lineInner + '</div>';
      var states = "";
      if (b.states) {
        states = '<div class="crop-states"><b>Major producers:</b> ' + esc(b.states) +
          (b.statesSource ? '<br><a href="' + esc(b.statesSource.url) + '" ' + linkAttrs + '>' + esc(b.statesSource.label) + ' ↗</a>' : '') +
          '</div>';
      }
      return '<div class="crop-row' + (b.states ? ' has-states' : '') + '">' + line + states + '</div>';
    }).join('');

    var html =
      '<p class="chart-title">' + esc(chart.title) + '</p>' +
      (chart.unit ? '<p class="chart-unit">' + esc(chart.unit) + '</p>' : '') +
      '<div class="bars">' + rows + '</div>' +
      (chart.footnote ? '<p class="chart-foot">' + esc(chart.footnote) + '</p>' : '') +
      sourcesLine(chart.sources);
    return el("div", "chart-card", html);
  }

  function buildCard(card) {
    var inner =
      '<h4>' + esc(card.title) + '</h4>' +
      '<p class="trade-text">' + esc(card.text) + '</p>' +
      (card.source ? '<p class="trade-src">Source: ' + esc(card.source.label) + ' ↗</p>' : '');
    if (card.source && card.source.url) {
      var a = el("a", "trade-card", inner);
      a.setAttribute("href", card.source.url);
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener noreferrer");
      return a;
    }
    return el("div", "trade-card", inner);
  }

  function buildBadges(block) {
    var frag = document.createDocumentFragment();
    if (block.title) frag.appendChild(el("p", "badge-title", esc(block.title)));
    var wrap = el("div", "badge-wrap");
    var src = block.source;
    (block.items || []).forEach(function (bd) {
      var inner = esc(bd.label) + ' — <b>' + esc(bd.detail) + '</b>';
      if (src && src.url) {
        var a = el("a", "rank-badge", inner);
        a.setAttribute("href", src.url);
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener noreferrer");
        a.setAttribute("title", "Open cited source");
        wrap.appendChild(a);
      } else {
        wrap.appendChild(el("span", "rank-badge", inner));
      }
    });
    frag.appendChild(wrap);
    if (src) { var d = el("div"); d.innerHTML = sourcesLine([src]); frag.appendChild(d); }
    return frag;
  }

  function growBars(container) {
    var fills = container.querySelectorAll(".crop-bar-fill");
    requestAnimationFrame(function () {
      fills.forEach(function (f) {
        requestAnimationFrame(function () { f.style.width = f.getAttribute("data-w") + "%"; });
      });
    });
  }

  /* renderers */
  function renderSidebar() {
    var nav = $("countryIndex");
    nav.innerHTML = "";
    countries.forEach(function (c) {
      var btn = el("button", "country-row" + (c.code === activeCode ? " active" : ""));
      btn.setAttribute("data-code", c.code);
      btn.innerHTML =
        '<span class="stamp">' + esc(c.code) + '</span>' +
        '<span><span class="country-row-name">' + esc(c.name) + '</span>' +
        '<span class="country-row-region">' + esc(c.region) + '</span></span>';
      btn.addEventListener("click", function () { setActive(c.code); });
      nav.appendChild(btn);
    });
  }

  function renderKpis(c) {
    var strip = $("kpiStrip");
    strip.innerHTML = "";
    (c.kpis || []).forEach(function (k) {
      strip.appendChild(el("div", "kpi-card",
        '<p class="kpi-label">' + esc(k.label) + '</p>' +
        '<p class="kpi-value">' + esc(k.value) + '</p>' +
        (k.note ? '<p class="kpi-note">' + esc(k.note) + '</p>' : '')));
    });
  }

  // remembers the active tab per window, keyed by window id
  var activeTabByWindow = {};
  var activeWindowId = null;

  function getWindows(c) {
    if (c.windows && c.windows.length) return c.windows;
    if (c.crops) return [Object.assign({ id: "crop-statistics" }, c.crops)]; // legacy fallback
    return [];
  }

  function renderWindows(c) {
    var wins = getWindows(c);
    var sw = $("windowSwitch");
    var host = $("windowsHost");
    sw.innerHTML = "";
    host.innerHTML = "";
    if (!wins.length) return;
    if (!activeWindowId || !wins.some(function (w) { return w.id === activeWindowId; })) {
      activeWindowId = wins[0].id;
    }
    sw.style.display = wins.length > 1 ? "" : "none";

    wins.forEach(function (win, i) {
      var b = el("button", "window-btn" + (win.id === activeWindowId ? " active" : ""),
        '<span class="win-num">' + (i + 1) + '</span><span>' + esc(win.heading || "") + '</span>');
      b.setAttribute("role", "tab");
      b.setAttribute("aria-selected", win.id === activeWindowId ? "true" : "false");
      b.addEventListener("click", function () {
        if (activeWindowId === win.id) return;
        activeWindowId = win.id;
        renderWindows(c);
      });
      sw.appendChild(b);
    });

    var active = wins.filter(function (w) { return w.id === activeWindowId; })[0];
    host.appendChild(buildWindow(c, active));
  }

  function buildWindow(c, win) {
    var section = el("section", "panel window");
    if (win.sub) section.appendChild(el("p", "panel-sub window-sub", esc(win.sub)));

    var tabs = win.tabs || [];
    var row = el("div", "tab-row");
    row.setAttribute("role", "tablist");
    row.setAttribute("aria-label", (win.heading || "") + " tabs");
    var panel = el("div", "tab-panel-body");
    panel.setAttribute("role", "tabpanel");

    if (!tabs.length) {
      panel.innerHTML = '<p class="tab-note">Nothing recorded here yet.</p>';
      section.appendChild(row); section.appendChild(panel); return section;
    }
    var active = activeTabByWindow[win.id];
    if (!active || !tabs.some(function (t) { return t.id === active; })) active = tabs[0].id;
    activeTabByWindow[win.id] = active;

    function draw() {
      row.innerHTML = "";
      tabs.forEach(function (t) {
        var b = el("button", "tab-btn" + (t.id === activeTabByWindow[win.id] ? " active" : ""), esc(t.label));
        b.setAttribute("role", "tab");
        b.setAttribute("aria-selected", t.id === activeTabByWindow[win.id] ? "true" : "false");
        b.addEventListener("click", function () { activeTabByWindow[win.id] = t.id; draw(); });
        row.appendChild(b);
      });
      renderTabPanel(panel, tabs.filter(function (t) { return t.id === activeTabByWindow[win.id]; })[0]);
    }
    draw();
    section.appendChild(row);
    section.appendChild(panel);
    return section;
  }

  function renderTabPanel(panel, tab) {
    panel.innerHTML = "";
    if (!tab) return;
    if (tab.note) panel.appendChild(el("p", "tab-note", esc(tab.note)));

    // support both new `blocks` and legacy charts/cards/badges
    var blocks = tab.blocks;
    if (!blocks) {
      blocks = [];
      (tab.charts || []).forEach(function (ch) { blocks.push({ type: "chart", chart: ch }); });
      (tab.cards || []).forEach(function (cd) { blocks.push({ type: "card", card: cd }); });
      if (tab.badges) blocks.push({ type: "badges", title: tab.badgesTitle, source: tab.badgesSource, items: tab.badges });
    }

    blocks.forEach(function (blk) {
      if (blk.type === "chart") panel.appendChild(buildChartCard(blk.chart || blk));
      else if (blk.type === "card") panel.appendChild(buildCard(blk.card || blk));
      else if (blk.type === "badges") panel.appendChild(buildBadges(blk));
    });

    growBars(panel);
  }

  function renderInsights(c) {
    var rail = $("insightRail");
    rail.innerHTML = "";
    (c.insights || []).forEach(function (ins) {
      rail.appendChild(el("div", "insight-card",
        '<h4>' + esc(ins.title) + '</h4><p>' + esc(ins.text) + '</p>'));
    });
  }

  function renderGlossary(c) {
    var btn = $("glossaryBtn"), panel = $("glossaryPanel"), grid = $("glossaryGrid");
    var items = c.glossary || [];
    if (!items.length) { btn.style.display = "none"; panel.classList.remove("open"); return; }
    btn.style.display = "";
    $("glossaryTitle").textContent = "Glossary — " + (c.name || "");
    $("glossarySub").textContent = "Full forms and a one-line note for every abbreviation used on this page.";
    grid.innerHTML = "";
    items.slice().sort(function (a, b) { return a.term.localeCompare(b.term); }).forEach(function (g) {
      grid.appendChild(el("div", "gloss-item",
        '<span class="gloss-term">' + esc(g.term) + '</span>' +
        '<span class="gloss-full">' + esc(g.full) + '</span>' +
        '<p class="gloss-note">' + esc(g.note) + '</p>'));
    });
  }
  $("glossaryBtn").addEventListener("click", function () {
    var panel = $("glossaryPanel");
    var open = panel.classList.toggle("open");
    this.classList.toggle("active", open);
    this.setAttribute("aria-expanded", open ? "true" : "false");
  });

  function setActive(code) {
    var c = countries.filter(function (x) { return x.code === code; })[0];
    if (!c) return;
    activeCode = code;
    activeTabByWindow = {};
    activeWindowId = null;
    $("activeRegion").textContent = c.region || "";
    $("activeName").textContent = c.name || "";
    $("activeSub").textContent = c.subtitle || "";
    $("thesis").textContent = c.thesis || "";
    renderSidebar();
    renderKpis(c);
    renderWindows(c);
    renderInsights(c);
    renderGlossary(c);
  }

  setActive(activeCode);
})();
</script>
</body>
</html>
