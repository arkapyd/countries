<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141210;
    --ink-soft:#5C5548;
    --cream-orange:#F7A64B;      /* primary */
    --cream-orange-hot:#F08A1D;  /* borders / accents */
    --burnt:#8A4A0F;             /* dark orange for small type */
    --eggshell:#F7F3E6;          /* secondary — page */
    --eggshell-raised:#FCFAF2;   /* cards */
    --line:#E2D9C2;
    --line-strong:#C9BC9B;
    --font-display:"Source Serif 4",Georgia,serif;
    --font-body:"Inter",-apple-system,sans-serif;
    --font-mono:"IBM Plex Mono",ui-monospace,monospace;
    --radius:4px;
    --pop:transform .16s cubic-bezier(.34,1.4,.64,1), background .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--eggshell);color:var(--ink);font-family:var(--font-body);}

  .frame{display:grid;grid-template-columns:264px 1fr;min-height:100vh;}

  /* ---------- sidebar ---------- */
  .sidebar{background:var(--eggshell-raised);border-right:2px solid var(--ink);display:flex;flex-direction:column;padding:26px 18px;}
  .brand{margin-bottom:24px;}
  .brand-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--burnt);margin:0 0 6px;}
  .brand-title{font-family:var(--font-display);font-size:23px;font-weight:700;margin:0;line-height:1.2;}
  .index-label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 10px;}
  .country-index{display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1;}
  .country-row{display:flex;align-items:center;gap:11px;padding:10px 9px;border:1.5px solid var(--line-strong);border-radius:var(--radius);background:var(--eggshell-raised);cursor:pointer;text-align:left;font-family:var(--font-body);color:var(--ink);width:100%;transition:var(--pop);}
  .country-row:hover{background:var(--cream-orange);border-color:var(--ink);transform:scale(1.04);}
  .country-row:hover .country-row-name,.country-row:hover .country-row-region{color:#000;font-weight:700;}
  .country-row.active{background:var(--cream-orange);border-color:var(--ink);box-shadow:3px 3px 0 var(--ink);}
  .country-row.active .country-row-name{font-weight:700;}
  .stamp{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;border:2px solid var(--cream-orange-hot);color:var(--burnt);background:var(--eggshell-raised);padding:3px 6px;border-radius:2px;transform:rotate(-2deg);flex-shrink:0;}
  .country-row:hover .stamp,.country-row.active .stamp{border-color:var(--ink);color:#000;}
  .country-row-name{font-size:14px;line-height:1.3;transition:color .16s,font-weight .16s;}
  .country-row-region{display:block;font-size:11px;color:var(--ink-soft);transition:color .16s;}
  .sidebar-foot{border-top:2px solid var(--ink);margin-top:16px;padding-top:12px;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);line-height:1.5;}
  .sidebar-foot p{margin:0 0 4px;}
  .sound-toggle{margin-top:8px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.05em;border:1.5px solid var(--line-strong);background:var(--eggshell-raised);color:var(--ink-soft);border-radius:var(--radius);padding:5px 9px;cursor:pointer;transition:var(--pop);}
  .sound-toggle:hover{background:var(--cream-orange);color:#000;font-weight:700;border-color:var(--ink);transform:scale(1.04);}

  /* ---------- main ---------- */
  .main{padding:30px 34px 48px;}
  .topbar{border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:22px;display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;}
  .topbar-eyebrow{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--burnt);margin:0 0 4px;}
  .topbar-title{font-family:var(--font-display);font-size:34px;font-weight:700;margin:0 0 2px;}
  .topbar-sub{font-size:13.5px;color:var(--ink-soft);margin:0;}
  .conversion-chip{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.03em;color:var(--burnt);border:1.5px solid var(--cream-orange-hot);background:var(--eggshell-raised);border-radius:999px;padding:5px 12px;white-space:nowrap;}

  /* two-column body: content left, insights rail right */
  .body-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:28px;align-items:start;}

  .thesis{font-family:var(--font-display);font-size:16.5px;font-weight:400;line-height:1.55;color:var(--ink);margin:0 0 26px;border-left:4px solid var(--cream-orange-hot);padding-left:16px;}

  .kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:30px;}
  .kpi-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-radius:var(--radius);padding:13px 15px;transition:var(--pop);cursor:default;}
  .kpi-card:hover{background:var(--cream-orange);border-color:var(--ink);transform:scale(1.05);box-shadow:4px 4px 0 var(--ink);z-index:2;position:relative;}
  .kpi-card:hover .kpi-label,.kpi-card:hover .kpi-value,.kpi-card:hover .kpi-note{color:#000;}
  .kpi-card:hover .kpi-label,.kpi-card:hover .kpi-note{font-weight:700;}
  .kpi-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--burnt);margin:0 0 8px;line-height:1.35;transition:color .16s,font-weight .16s;}
  .kpi-value{font-family:var(--font-display);font-size:24px;font-weight:700;margin:0 0 5px;line-height:1.05;transition:color .16s;}
  .kpi-note{font-size:11px;color:var(--ink-soft);margin:0;line-height:1.35;transition:color .16s,font-weight .16s;}

  .panel{margin-bottom:30px;}
  .panel-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap;border-bottom:2px solid var(--ink);padding-bottom:7px;}
  .panel-head h3{font-family:var(--font-display);font-size:19px;font-weight:700;margin:0;}
  .panel-sub{font-size:12.5px;color:var(--ink-soft);margin:0;}

  /* ---------- crop tabs ---------- */
  .tab-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .tab-btn{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:9px 18px;border:1.5px solid var(--line-strong);background:var(--eggshell-raised);color:var(--ink-soft);border-radius:var(--radius);cursor:pointer;transition:var(--pop);}
  .tab-btn:hover{background:var(--cream-orange);color:#000;font-weight:700;border-color:var(--ink);transform:scale(1.06);}
  .tab-btn.active{background:var(--cream-orange);color:#000;font-weight:700;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);}
  .tab-note{font-size:12.5px;line-height:1.5;color:var(--ink-soft);border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:var(--eggshell-raised);padding:10px 14px;margin:0 0 16px;}
  .tab-note strong{color:var(--burnt);}

  .chart-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-radius:var(--radius);padding:16px 18px 12px;margin-bottom:16px;transition:var(--pop);}
  .chart-card:hover{border-color:var(--ink);box-shadow:4px 4px 0 var(--ink);}
  .chart-title{font-family:var(--font-display);font-size:16px;font-weight:700;margin:0 0 2px;}
  .chart-unit{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--burnt);margin:0 0 10px;}
  .chart-svg{width:100%;height:auto;display:block;}
  .chart-foot{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin:8px 0 2px;border-top:1px solid var(--line);padding-top:8px;}
  .chart-source{font-family:var(--font-mono);font-size:10px;color:var(--burnt);margin-bottom:4px;display:block;}

  .bar-row { cursor: pointer; } /* Added clickable pointer */
  .bar-row .bar{fill:var(--cream-orange);stroke:var(--ink);stroke-width:1.5;transition:fill .16s ease;}
  .bar-row .bar-label{font-family:var(--font-mono);font-size:11px;fill:var(--ink);transition:font-weight .16s,fill .16s;}
  .bar-row .bar-value{font-family:var(--font-mono);font-size:11.5px;font-weight:600;fill:var(--burnt);transition:font-weight .16s,fill .16s;}
  .bar-row:hover .bar{fill:var(--cream-orange-hot);}
  .bar-row:hover .bar-label,.bar-row:hover .bar-value{fill:#000;font-weight:700;}

  .badge-title{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:4px 0 10px;}
  .badge-wrap{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:6px;}
  .rank-badge{font-family:var(--font-mono);font-size:11px;border:2px solid var(--cream-orange-hot);background:var(--eggshell-raised);color:var(--ink);border-radius:2px;padding:5px 9px;transform:rotate(-1.2deg);transition:var(--pop);cursor:default;}
  .rank-badge:nth-child(even){transform:rotate(1.2deg);}
  .rank-badge b{color:var(--burnt);font-weight:600;}
  .rank-badge:hover{background:var(--cream-orange);border-color:var(--ink);color:#000;font-weight:700;transform:scale(1.08) rotate(0deg);box-shadow:3px 3px 0 var(--ink);}
  .rank-badge:hover b{color:#000;font-weight:700;}

  .trade-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-left:4px solid var(--cream-orange-hot);border-radius:var(--radius);padding:14px 17px;margin-bottom:12px;transition:var(--pop);}
  .trade-card:hover{background:var(--cream-orange);border-color:var(--ink);border-left-color:var(--ink);transform:scale(1.02);box-shadow:4px 4px 0 var(--ink);}
  .trade-card:hover h4,.trade-card:hover p{color:#000;}
  .trade-card:hover p{font-weight:700;}
  .trade-card h4{font-family:var(--font-display);font-size:15.5px;font-weight:700;margin:0 0 6px;transition:color .16s;}
  .trade-card p{font-size:13px;line-height:1.55;margin:0;color:var(--ink);transition:color .16s,font-weight .16s;}

  /* insights rail */
  .rail-head{border-bottom:2px solid var(--ink);padding-bottom:7px;margin-bottom:14px;}
  .rail-head h3{font-family:var(--font-display);font-size:19px;font-weight:700;margin:0 0 2px;}
  .rail-head p{font-size:12px;color:var(--ink-soft);margin:0;}
  .insight-rail{display:flex;flex-direction:column;gap:12px;}
  .insight-card{background:var(--eggshell-raised);border:1.5px solid var(--line-strong);border-left:4px solid var(--cream-orange-hot);border-radius:var(--radius);padding:13px 16px;transition:var(--pop);}
  .insight-card:hover{background:var(--cream-orange);border-color:var(--ink);border-left-color:var(--ink);transform:scale(1.03);box-shadow:4px 4px 0 var(--ink);}
  .insight-card:hover h4,.insight-card:hover p{color:#000;}
  .insight-card:hover p{font-weight:700;}
  .insight-card h4{font-family:var(--font-display);font-size:15px;font-weight:700;margin:0 0 6px;line-height:1.3;transition:color .16s;}
  .insight-card p{font-size:12.5px;line-height:1.5;margin:0;color:var(--ink);transition:color .16s,font-weight .16s;}

  /* ---------- responsive ---------- */
  @media (max-width:1080px){
    .body-grid{grid-template-columns:1fr;}
    .insight-rail{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
  }
  @media (max-width:820px){
    .frame{grid-template-columns:1fr;}
    .sidebar{border-right:none;border-bottom:2px solid var(--ink);}
    .country-index{flex-direction:row;flex-wrap:wrap;overflow-y:visible;}
    .country-row{width:auto;}
    .main{padding:22px 18px 40px;}
    .topbar-title{font-size:27px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="frame">

  <aside class="sidebar">
    <div class="brand">
      <p class="brand-eyebrow" id="fileLabel">Research file</p>
      <h1 class="brand-title" id="dashTitle">Country dashboard</h1>
    </div>

    <p class="index-label">Countries</p>
    <nav class="country-index" id="countryIndex" aria-label="Countries covered"></nav>

    <div class="sidebar-foot">
      <p id="baselineNote"></p>
      <p id="lastUpdated"></p>
      <button class="sound-toggle" id="soundToggle" type="button">Sound: on</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p class="topbar-eyebrow" id="activeRegion"></p>
        <h2 class="topbar-title" id="activeName"></h2>
        <p class="topbar-sub" id="activeSub"></p>
      </div>
      <span class="conversion-chip" id="conversionChip"></span>
    </header>

    <div class="body-grid">

      <div class="body-left">
        <p class="thesis" id="thesis"></p>

        <section class="kpi-strip" id="kpiStrip" aria-label="Summary indicators"></section>

        <section class="panel">
          <div class="panel-head">
            <h3 id="cropsHeading">Crop statistics</h3>
            <p class="panel-sub" id="cropsSub"></p>
          </div>
          <div class="tab-row" id="tabRow" role="tablist" aria-label="Crop statistics tabs"></div>
          <div id="tabPanel" role="tabpanel"></div>
        </section>
      </div>

      <aside class="body-right">
        <div class="rail-head">
          <h3>Key insights</h3>
          <p>The core argument, drawn from the research</p>
        </div>
        <div class="insight-rail" id="insightRail"></div>
      </aside>

    </div>
  </main>

</div>

<script>
// Generating the embedded payload based on the provided document[cite: 1]
window.DASHBOARD_DATA = {
  meta: {
    title: "Agriculture & Climate Resilience Dashboard[cite: 1]",
    fileLabel: "Research Report",
    lastUpdated: "2026-27",
    conversionNote: "Values based on latest 2024-25 estimates[cite: 1]"
  },
  countries: [
    {
      code: "IN",
      name: "India",
      region: "South Asia",
      subtitle: "Context, Policy, and Challenges",
      thesis: "India’s stance on climate action in agriculture is adaptation-first, with mitigation arriving as a by-outcome of adaptive practice.[cite: 1]",
      kpis: [
        { label: "Agriculture Workforce", value: "46%+", note: "of national workforce[cite: 1]" },
        { label: "GVA Contribution", value: "18.4%", note: "at current prices (2022-23)[cite: 1]" },
        { label: "Rain-fed Sown Area", value: "55%", note: "supporting 61% of farmers[cite: 1]" },
        { label: "Foodgrain Production", value: "357.7m", note: "tonnes in 2024-25[cite: 1]" }
      ],
      crops: {
        heading: "Production & Investment Statistics",
        sub: "Data on leading yields and agricultural budget composition[cite: 1]",
        tabs: [
          {
            id: "production",
            label: "Production",
            charts: [
              {
                title: "Key Crop Production (2024-25)",
                unit: "Million Tonnes",
                source: "National Food Security Mission (NFSM) / ICAR",
                bars: [
                  { label: "Rice", value: 150.18, url: "https://nfsm.gov.in" },
                  { label: "Wheat", value: 117.94, url: "https://nfsm.gov.in" },
                  { label: "Pulses", value: 25.68, url: "https://nfsm.gov.in" },
                  { label: "Millets", value: 18.59, url: "https://nfsm.gov.in" }
                ]
              },
              {
                title: "Agriculture Budget Allocation (2026-27)",
                unit: "₹ Crore",
                source: "Demand for Grants Analysis, PRS Legislative Research",
                bars: [
                  { label: "PM-KISAN", value: 63500, url: "https://prsindia.org" },
                  { label: "Credit Subvention", value: 22600, url: "https://prsindia.org" },
                  { label: "Crop Insurance", value: 12200, url: "https://prsindia.org" },
                  { label: "RKVY", value: 8550, url: "https://prsindia.org" }
                ]
              }
            ],
            badgesTitle: "Global Agricultural Ranks",
            badges: [
              { label: "Millets", detail: "1st globally[cite: 1]" },
              { label: "Rice", detail: "1st globally[cite: 1]" },
              { label: "Wheat", detail: "2nd globally[cite: 1]" },
              { label: "Pulses", detail: "1st globally[cite: 1]" }
            ]
          },
          {
            id: "resilience",
            label: "Climate Interventions",
            cards: [
              {
                title: "Micro-irrigation Expansion",
                text: "109 lakh hectares brought under micro-irrigation since 2015-16, with ₹21,968.75 crore released to Dec 2024.[cite: 1]"
              },
              {
                title: "Soil Health Cards",
                text: "Over 24.60 crore cards issued since 2015 assessing twelve key soil parameters to boost sustainable land management.[cite: 1]"
              },
              {
                title: "Organic & Natural Farming",
                text: "PKVY and MOVCDNER have mobilised roughly 16.7 lakh hectares across 27.5 lakh farmers to establish robust organic value chains.[cite: 1]"
              }
            ]
          }
        ]
      },
      insights: [
        {
          title: "Vulnerability Exposure",
          text: "Over 80% of India’s population lives in districts highly vulnerable to hydro-meteorological disasters such as floods, droughts, and cyclones.[cite: 1]"
        },
        {
          title: "Adaptation Focus",
          text: "Mandating sustainable practice shifts on smallholders without providing financial insulation is contrary to equity principles; hence the adaptation-first stance.[cite: 1]"
        },
        {
          title: "Infrastructure Gap",
          text: "While resilience is promoted on the farm via water and soil initiatives, wider supply chain processing, packaging, and transport lag behind.[cite: 1]"
        }
      ]
    }
  ]
};

(function () {
  var D = window.DASHBOARD_DATA;
  if (!D || !D.countries || !D.countries.length) {
    document.getElementById("thesis").textContent =
      "No data found. Check that data.js is present and defines window.DASHBOARD_DATA.";
    return;
  }

  var meta = D.meta || {};
  var countries = D.countries;
  var activeCode = countries[0].code;
  var activeTabId = null;

  var $ = function (id) { return document.getElementById(id); };
  var el = function (tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  };
  var esc = function (s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  };

  /* ---------- gentle click sound (WebAudio, no files) ---------- */
  var soundOn = true;
  var audioCtx = null;
  function tick() {
    if (!soundOn) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      var t = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(660, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.07);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.05, t + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.1);
    } catch (e) { /* audio unavailable — stay silent */ }
  }
  document.addEventListener("click", function (e) {
    if (e.target.closest(".country-row, .kpi-card, .insight-card, .trade-card, .chart-card, .tab-btn, .rank-badge, .sound-toggle, .bar-row")) tick();
  });
  $("soundToggle").addEventListener("click", function () {
    soundOn = !soundOn;
    this.textContent = "Sound: " + (soundOn ? "on" : "off");
    if (soundOn) tick();
  });

  /* ---------- static chrome ---------- */
  if (meta.fileLabel) $("fileLabel").textContent = meta.fileLabel;
  if (meta.title) { $("dashTitle").textContent = meta.title; document.title = meta.title; }
  $("baselineNote").textContent = meta.baselineNote || "";
  $("lastUpdated").textContent = meta.lastUpdated ? "Updated " + meta.lastUpdated : "";
  $("conversionChip").textContent = meta.conversionNote || "";
  if (!meta.conversionNote) $("conversionChip").style.display = "none";

  /* ---------- SVG bar chart builder ---------- */
  var CH = { w: 640, labelW: 172, barX: 180, maxBarW: 380, rowH: 34, barH: 20, padTop: 4 };
  function buildBarChart(chart) {
    var bars = chart.bars || [];
    var max = chart.max || Math.max.apply(null, bars.map(function (b) { return b.value; })) || 1;
    var h = CH.padTop + bars.length * CH.rowH;
    var svg = '<svg class="chart-svg" viewBox="0 0 ' + CH.w + ' ' + h + '" role="img" aria-label="' +
      esc(chart.title) + '">';
    
    bars.forEach(function (b, i) {
      var y = CH.padTop + i * CH.rowH;
      var w = Math.max(3, Math.round((b.value / max) * CH.maxBarW));
      var cy = y + CH.barH / 2 + 4;
      
      // Inject url redirection for clickable bars
      var clickAction = b.url ? ' onclick="window.open(\'' + esc(b.url) + '\', \'_blank\')"' : '';

      svg += '<g class="bar-row"' + clickAction + '>' +
        '<text class="bar-label" x="' + (CH.barX - 10) + '" y="' + cy + '" text-anchor="end">' + esc(b.label) + '</text>' +
        '<rect class="bar" data-w="' + w + '" x="' + CH.barX + '" y="' + (y + 3) + '" width="0" height="' + CH.barH + '" rx="2"></rect>' +
        '<text class="bar-value" x="' + (CH.barX + w + 9) + '" y="' + cy + '">' + esc(b.display != null ? b.display : b.value) + '</text>' +
        '</g>';
    });
    svg += '</svg>';
    return svg;
  }
  function growBars(container) {
    var rects = container.querySelectorAll("rect.bar");
    requestAnimationFrame(function () {
      rects.forEach(function (r) {
        r.style.transition = "width .55s cubic-bezier(.25,1,.4,1)";
        requestAnimationFrame(function () { r.style.width = r.getAttribute("data-w") + "px"; });
      });
    });
  }

  /* ---------- renderers ---------- */
  function renderSidebar() {
    var nav = $("countryIndex");
    nav.innerHTML = "";
    countries.forEach(function (c) {
      var btn = el("button", "country-row" + (c.code === activeCode ? " active" : ""));
      btn.setAttribute("data-code", c.code);
      btn.innerHTML =
        '<span class="stamp">' + esc(c.code) + '</span>' +
        '<span><span class="country-row-name">' + esc(c.name) + '</span>' +
        '<span class="country-row-region">' + esc(c.region) + '</span></span>';
      btn.addEventListener("click", function () { setActive(c.code); });
      nav.appendChild(btn);
    });
  }

  function renderKpis(c) {
    var strip = $("kpiStrip");
    strip.innerHTML = "";
    (c.kpis || []).forEach(function (k) {
      var card = el("div", "kpi-card");
      card.innerHTML =
        '<p class="kpi-label">' + esc(k.label) + '</p>' +
        '<p class="kpi-value">' + esc(k.value) + '</p>' +
        (k.note ? '<p class="kpi-note">' + esc(k.note) + '</p>' : '');
      strip.appendChild(card);
    });
  }

  function renderTabs(c) {
    var crops = c.crops || { tabs: [] };
    $("cropsHeading").textContent = crops.heading || "Crop statistics";
    $("cropsSub").textContent = crops.sub || "";
    var row = $("tabRow");
    row.innerHTML = "";
    var tabs = crops.tabs || [];
    if (!tabs.length) {
      $("tabPanel").innerHTML = '<p class="tab-note">No crop statistics recorded for this country yet.</p>';
      return;
    }
    if (!activeTabId || !tabs.some(function (t) { return t.id === activeTabId; })) {
      activeTabId = tabs[0].id;
    }
    tabs.forEach(function (t) {
      var b = el("button", "tab-btn" + (t.id === activeTabId ? " active" : ""), esc(t.label));
      b.setAttribute("role", "tab");
      b.setAttribute("aria-selected", t.id === activeTabId ? "true" : "false");
      b.addEventListener("click", function () {
        activeTabId = t.id;
        renderTabs(c);
      });
      row.appendChild(b);
    });
    renderTabPanel(tabs.filter(function (t) { return t.id === activeTabId; })[0]);
  }

  function renderTabPanel(tab) {
    var panel = $("tabPanel");
    panel.innerHTML = "";
    if (!tab) return;

    if (tab.note) {
      panel.appendChild(el("p", "tab-note", esc(tab.note)));
    }
    (tab.cards || []).forEach(function (card) {
      panel.appendChild(el("div", "trade-card",
        '<h4>' + esc(card.title) + '</h4><p>' + esc(card.text) + '</p>'));
    });
    (tab.charts || []).forEach(function (chart) {
      var cardHtml =
        '<p class="chart-title">' + esc(chart.title) + '</p>' +
        (chart.unit ? '<p class="chart-unit">' + esc(chart.unit) + '</p>' : '') +
        buildBarChart(chart) +
        // Added rendering for the chart source footnote
        (chart.source ? '<p class="chart-foot"><span class="chart-source">Source: ' + esc(chart.source) + '[cite: 1]</span></p>' : '') +
        (chart.footnote ? '<p class="chart-foot">' + esc(chart.footnote) + '</p>' : '');
      panel.appendChild(el("div", "chart-card", cardHtml));
    });
    if (tab.badges && tab.badges.length) {
      if (tab.badgesTitle) panel.appendChild(el("p", "badge-title", esc(tab.badgesTitle)));
      var wrap = el("div", "badge-wrap");
      tab.badges.forEach(function (bd) {
        wrap.appendChild(el("span", "rank-badge",
          esc(bd.label) + ' — <b>' + esc(bd.detail) + '</b>'));
      });
      panel.appendChild(wrap);
    }
    growBars(panel);
  }

  function renderInsights(c) {
    var rail = $("insightRail");
    rail.innerHTML = "";
    (c.insights || []).forEach(function (ins) {
      var card = el("div", "insight-card");
      card.innerHTML =
        '<h4>' + esc(ins.title) + '</h4>' +
        '<p>' + esc(ins.text) + '</p>';
      rail.appendChild(card);
    });
  }

  function setActive(code) {
    var c = countries.filter(function (x) { return x.code === code; })[0];
    if (!c) return;
    activeCode = code;
    activeTabId = null; // reset to first tab for the new country
    $("activeRegion").textContent = c.region || "";
    $("activeName").textContent = c.name || "";
    $("activeSub").textContent = c.subtitle || "";
    $("thesis").textContent = c.thesis || "";
    renderSidebar();
    renderKpis(c);
    renderTabs(c);
    renderInsights(c);
  }

  setActive(activeCode);
})();
</script>
</body>
</html>
